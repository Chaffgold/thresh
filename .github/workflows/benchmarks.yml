name: Benchmarks

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *" # nightly at 04:00 UTC

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  synthetic-benchmarks:
    name: Synthetic benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run synthetic benchmark tests
        run: cargo test -p thresh-data benchmark --release

  network-benchmarks:
    name: Network benchmarks (nightly)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run ADS-B benchmarks
        run: cargo test -p thresh-data --features adsb -- adsb --release
      - name: Run orbital benchmarks
        run: cargo test -p thresh-data --features orbital -- orbital --release
