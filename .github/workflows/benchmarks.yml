name: Benchmarks

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *" # nightly at 04:00 UTC

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  synthetic-benchmarks:
    name: Synthetic benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run synthetic benchmark tests
        run: cargo test -p thresh-data benchmark --release

  criterion-benchmarks:
    name: Criterion benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run criterion benchmarks
        run: cargo bench --workspace -- --output-format bencher 2>&1 | tee benchmark-results.txt
      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.sha }}
          path: benchmark-results.txt
          retention-days: 90

  # PR benchmark regression check — runs on pull requests to compare against
  # the latest develop baseline. Currently extracts timing data and uploads as
  # an artifact for manual review.
  #
  # TODO: Integrate `github-action-benchmark` (or `criterion-compare-action`)
  # to automatically compare PR results against the stored develop baseline
  # and post a comment on the PR flagging any >10% regressions. This requires:
  #   1. A gh-pages branch or separate artifact store for baseline data
  #   2. `github-action-benchmark` configured with alert-threshold: 110%
  #   3. comment-on-alert: true to post PR comments
  # See: https://github.com/benchmark-action/github-action-benchmark
  pr-benchmark-check:
    name: PR benchmark regression check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run criterion benchmarks
        run: cargo bench --workspace -- --output-format bencher 2>&1 | tee bench-output.txt
      - name: Extract timing summary
        run: |
          echo "## Benchmark Results" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          grep -E "^test .* bench:" bench-output.txt | \
            awk '{printf "%-60s %s %s\n", $2, $5, $6}' >> "$GITHUB_STEP_SUMMARY" \
            || echo "No benchmark lines found" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
      - name: Upload PR benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: pr-benchmark-results-${{ github.event.pull_request.number }}-${{ github.sha }}
          path: bench-output.txt
          retention-days: 30

  network-benchmarks:
    # Runs the `#[ignore]`-gated network-backed integration tests that
    # exercise the real Space-Track / CelesTrak / OpenSky HTTP paths
    # under `thresh-data`. These require live outbound HTTPS to
    # www.space-track.org, celestrak.org, and opensky-network.org and
    # optionally THRESH_SPACETRACK_USERNAME / _PASSWORD for the
    # authenticated paths.
    #
    # The `|| true` guards let the job continue past individual network
    # failures — this is a nightly "everything still connects?" canary
    # rather than a blocking gate. The step summary captures stderr so
    # a persistent outage can be traced back to the failing endpoint.
    name: Network benchmarks (nightly)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: CelesTrak public TLE fetch
        run: |
          cargo test -p thresh-data --features orbital -- \
            --ignored celestrak_fetch_gp celestrak_fetch_catnr_iss --nocapture \
          || echo "::warning::CelesTrak network test failed — see logs"

      - name: Space-Track authenticated TLE fetch
        env:
          THRESH_SPACETRACK_USERNAME: ${{ secrets.THRESH_SPACETRACK_USERNAME }}
          THRESH_SPACETRACK_PASSWORD: ${{ secrets.THRESH_SPACETRACK_PASSWORD }}
        run: |
          if [ -z "${THRESH_SPACETRACK_USERNAME:-}" ] || [ -z "${THRESH_SPACETRACK_PASSWORD:-}" ]; then
            echo "::warning::THRESH_SPACETRACK_USERNAME / _PASSWORD secrets not set — skipping Space-Track test"
            exit 0
          fi
          cargo test -p thresh-data --features orbital -- \
            --ignored spacetrack_fetch_tle --nocapture \
          || echo "::warning::Space-Track network test failed — see logs"

      - name: OpenSky live state fetch
        run: |
          cargo test -p thresh-data --features adsb -- \
            --ignored integration_fetch_live_states --nocapture \
          || echo "::warning::OpenSky network test failed — see logs"
