name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 6 * * 1'   # Weekly Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  doc:
    name: Doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: -Dwarnings

  openspec:
    name: OpenSpec Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install -g @fission-ai/openspec@latest
        env:
          OPENSPEC_TELEMETRY: '0'
      - run: openspec validate --all --strict --no-interactive
        env:
          OPENSPEC_TELEMETRY: '0'

  synth-benchmark-gate:
    # Runs every synthetic benchmark scenario through `thresh-data run` and
    # fails the build if any scenario's regression check (MOTA / HOTA / IDF1
    # baselines) does not pass. This is the cheap in-repo equivalent of the
    # full benchmarks workflow — no network, no long-running integration
    # tests, just the baseline regression gate for the scenarios checked
    # into `crates/thresh-data/scenarios/`.
    name: Synthetic benchmark gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build thresh-data CLI
        run: cargo build -p thresh-data --bin thresh-data
      - name: Run all synthetic scenarios
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          any=0
          for toml in crates/thresh-data/scenarios/synth-*.toml; do
            any=1
            echo "=== $toml ==="
            ./target/debug/thresh-data run "$toml"
          done
          if [ "$any" -eq 0 ]; then
            echo "no synth-*.toml scenarios found under crates/thresh-data/scenarios/" >&2
            exit 1
          fi

  orbital-benchmark-gate:
    # Same regression gate pattern as synth-benchmark-gate, but for orbital
    # scenarios that need the `orbital` feature (sgp4 + reqwest). All
    # orbital-*.toml scenarios in the repo use cached TLE files so this
    # job still runs without network access; the HTTP fallback path in
    # `run_orbital_benchmark` is exercised by the `--ignored` integration
    # tests under `crates/thresh-data/tests/`.
    name: Orbital benchmark gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build thresh-data CLI with orbital feature
        run: cargo build -p thresh-data --features orbital --bin thresh-data
      - name: Run all orbital scenarios
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          any=0
          for toml in crates/thresh-data/scenarios/orbital-*.toml; do
            any=1
            echo "=== $toml ==="
            ./target/debug/thresh-data run "$toml"
          done
          if [ "$any" -eq 0 ]; then
            echo "no orbital-*.toml scenarios found under crates/thresh-data/scenarios/" >&2
            exit 1
          fi

  python-tests:
    name: Python tests
    runs-on: ubuntu-latest
    env:
      VIRTUAL_ENV: ${{ github.workspace }}/.venv
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Create virtualenv and install Python deps
        run: |
          python -m venv "$VIRTUAL_ENV"
          "$VIRTUAL_ENV/bin/pip" install --upgrade pip
          "$VIRTUAL_ENV/bin/pip" install maturin pytest numpy
      - name: Build and install thresh-py
        run: |
          export PATH="$VIRTUAL_ENV/bin:$PATH"
          cd crates/thresh-py && maturin develop
      - name: Run pytest
        run: |
          export PATH="$VIRTUAL_ENV/bin:$PATH"
          pytest tests/python/ -v

  python-training-tree:
    # Lint + type-check + smoke-test the python/ training tree
    # (separate from crates/thresh-py, which is a maturin-built binding).
    # Installs only the `dev` dependency group via uv; the heavier
    # `training` optional deps (torch, onnx, onnxruntime) are pulled in
    # by the training and export scripts in Phases 6–7, not here.
    name: Python training tree
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: 'latest'
      - name: Sync dev deps
        working-directory: python
        run: uv sync --no-default-groups --group dev
      - name: ruff check
        working-directory: python
        run: uv run --no-default-groups --group dev ruff check .
      - name: pyright
        working-directory: python
        run: uv run --no-default-groups --group dev pyright
      - name: pytest
        working-directory: python
        run: uv run --no-default-groups --group dev pytest -q

  adsb-benchmark-gate:
    # Same regression gate pattern as synth-benchmark-gate / orbital-benchmark-gate,
    # but for ADS-B scenarios that need the `adsb` feature (reqwest + csv).
    # All adsb-*.toml scenarios in the repo reference cached JSON state-vector
    # fixtures so this job runs offline. The live-OpenSky fallback path in
    # `run_adsb_benchmark` is exercised by the `--ignored` integration tests
    # under `crates/thresh-data/tests/`.
    name: ADS-B benchmark gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build thresh-data CLI with adsb feature
        run: cargo build -p thresh-data --features adsb --bin thresh-data
      - name: Run all ADS-B scenarios
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          any=0
          for toml in crates/thresh-data/scenarios/adsb-*.toml; do
            any=1
            echo "=== $toml ==="
            ./target/debug/thresh-data run "$toml"
          done
          if [ "$any" -eq 0 ]; then
            echo "no adsb-*.toml scenarios found under crates/thresh-data/scenarios/" >&2
            exit 1
          fi

  viz-build:
    # Cross-platform GUI build smoke test. egui/eframe pull in
    # platform-specific windowing crates (winit, wayland-client on
    # Linux, AppKit on macOS, win32 on Windows) that can break in
    # ways the default Linux CI doesn't catch. We verify the build
    # graph compiles on all three OSes; no headless GUI run is
    # attempted — the build itself is the smoke test.
    #
    # `fail-fast: false` so a Windows or macOS hiccup doesn't mask
    # results from the other platforms.
    name: viz-build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux GUI deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxkbcommon-dev \
            libwayland-dev libxcb-render0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev
      - name: Build thresh-viz with gui feature
        run: cargo build -p thresh-viz --features gui

  changes:
    # PR-only path filter: detect whether this PR touches the ONNX
    # inference code path so the (slow, uncached) ONNX job below can
    # be skipped on PRs that don't need it.
    name: Detect changed paths
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      inference: ${{ steps.filter.outputs.inference }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            inference:
              - 'crates/thresh-inference/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/ci.yml'

  onnx-tests:
    # ONNX inference tests require ORT binaries which the ort crate
    # auto-downloads during build. ORT download is slow and not cached
    # by rust-cache, so we skip this job on PRs that don't touch
    # inference-relevant paths. Always runs on schedule (weekly) and
    # workflow_dispatch.
    name: ONNX inference tests
    runs-on: ubuntu-latest
    needs: changes
    if: |
      always() && (
        github.event_name == 'schedule' ||
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'pull_request' && needs.changes.outputs.inference == 'true')
      )
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install ONNX Runtime
        run: |
          # ort crate auto-downloads ORT binaries on first build
          echo "ORT will be fetched by the ort crate during build"
      - name: Run inference tests
        run: cargo test -p thresh-inference --features onnx
