repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all --
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --workspace --all-targets -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-test
        name: cargo test
        entry: cargo test --workspace
        language: system
        types: [rust]
        pass_filenames: false
        stages: [pre-push]

      - id: cargo-check
        name: cargo check
        entry: cargo check --workspace
        language: system
        types: [rust]
        pass_filenames: false

      - id: openspec-validate
        name: openspec validate
        entry: openspec validate --all --strict --no-interactive
        language: system
        files: ^openspec/
        pass_filenames: false

      - id: python-training-ruff
        name: ruff (python/)
        entry: bash -c 'cd python && uv run --no-default-groups --group dev ruff check .'
        language: system
        files: ^python/
        pass_filenames: false

      - id: python-training-pyright
        name: pyright (python/)
        entry: bash -c 'cd python && uv run --no-default-groups --group dev pyright'
        language: system
        files: ^python/
        pass_filenames: false
