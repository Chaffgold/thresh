sonar.projectKey=Chaffgold_thresh
sonar.organization=chaffgold
sonar.projectName=thresh

# Exclude Rust files from Copy-Paste Detection (CPD) when their
# duplication is structural and unavoidable.
#
# - imm.rs: SonarCloud's CPD does not understand Rust trait implementations
#   and falsely flags the repeated method signatures across impls of the
#   same trait as duplication. The IMM filter's StateMapping trait has 4
#   implementations whose `to_common` / `from_common` signatures are
#   necessarily identical.
#
# - radar_trajectory.rs: per-class const tables (CLASS_BOX_DIMS,
#   CLASS_RCS_M2) use repeated struct-literal shapes by design, and the
#   two point-cloud writer helpers (write_target_returns, fill_clutter)
#   share the same 4-channel write idiom. The duplication is the API
#   shape, not a code smell.
sonar.cpd.exclusions=**/imm.rs,**/radar_trajectory.rs
