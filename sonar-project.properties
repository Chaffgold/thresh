sonar.projectKey=Chaffgold_thresh
sonar.organization=chaffgold
sonar.projectName=thresh

# Exclude Rust trait-impl files from Copy-Paste Detection (CPD).
# SonarCloud's CPD does not understand Rust trait implementations and
# falsely flags the repeated method signatures across impls of the same
# trait as duplication. The IMM filter's StateMapping trait has 4
# implementations whose `to_common` / `from_common` signatures are
# necessarily identical, which triggers the 3% new-code duplication gate.
sonar.cpd.exclusions=**/imm.rs
